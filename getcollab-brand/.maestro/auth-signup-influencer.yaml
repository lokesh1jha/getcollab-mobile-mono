appId: in.getcollab.app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd
- assertVisible: "GetCollab"
- tapOn: "Sign Up"
- inputText: "test+creator@getcollab.in"
- tapOn:
    id: "password"
    optional: true
- inputText: "TestPass123!"
- tapOn:
    id: "name"
    optional: true
- inputText: "Test Creator"
- tapOn: "Sign Up"
- waitForAnimationToEnd
- assertVisible:
    text: "creator"
    timeout: 10000
    optional: true
