appId: in.getcollab.app
---
- launchApp:
    clearState: true
- runFlow: auth-signin.yaml
- waitForAnimationToEnd
- tapOn: "Settings"
    optional: true
- tapOn: "Change Password"
    optional: true
- assertVisible:
    text: "Current Password"
    timeout: 10000
    optional: true
- tapOn:
    id: "currentPassword"
    optional: true
- inputText: "TestPass123!"
    optional: true
- tapOn:
    id: "newPassword"
    optional: true
- inputText: "NewTestPass456!"
    optional: true
- tapOn:
    text: "Change Password"
    optional: true
- waitForAnimationToEnd
- assertVisible:
    text: "Password changed"
    timeout: 10000
    optional: true
