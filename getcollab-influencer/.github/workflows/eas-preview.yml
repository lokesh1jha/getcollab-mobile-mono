name: EAS Update Preview

on:
  pull_request:
    paths:
      - 'getcollab-mobile/**'

defaults:
  run:
    working-directory: getcollab-mobile

jobs:
  eas-update:
    name: Publish EAS Update preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: getcollab-mobile/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish preview update
        run: eas update --branch=pr-${{ github.event.number }} --message="PR #${{ github.event.number }} — ${{ github.event.pull_request.title }}"

      - name: Comment QR codes on PR
        uses: actions/github-script@v7
        with:
          script: |
            const channel = `pr-${context.issue.number}`
            const link = `https://expo.dev/preview/update?channel-name=${channel}`
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📱 **EAS preview ready**\n\nChannel: \`${channel}\`\nOpen in Expo Go: ${link}\n\nTo install on a device, scan the QR code at the link above.`
            })

# Manual one-time setup (cannot be automated):
# 1. Run `eas init` in getcollab-mobile/ to create an Expo project ID
# 2. Set `expo.updates.url` and `expo.runtimeVersion` in app.json
# 3. Add EXPO_TOKEN to GitHub Actions secrets (expo.dev/accounts/[org]/settings/access-tokens)
